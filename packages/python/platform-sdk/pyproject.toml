[build-system]
requires = ["setuptools>=70.0"]
build-backend = "setuptools.build_meta"

[project]
name = "prom-platform-sdk"
version = "0.1.0"
description = "Shared PROM platform infrastructure primitives"
requires-python = ">=3.14"
dependencies = [
  "boto3>=1.40.0,<2.0.0",
  "botocore>=1.40.0,<2.0.0",
  "fastapi>=0.136.3,<0.137.0",
  "prometheus-client==0.25.0",
  "PyJWT[crypto]>=2.10.0,<3.0.0",
  "pydantic>=2.11.0,<3.0.0",
  "pydantic-settings>=2.8.0,<3.0.0",
  "SQLAlchemy>=2.0.40,<3.0.0",
  "starlette>=0.49.1,<2.0.0",
]

[project.optional-dependencies]
dev = [
  "httpx>=0.28.0,<1.0.0",
  "pytest>=9.0.3,<10.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.deptry]
known_first_party = ["platform_sdk"]
package_module_name_map = { PyJWT = "jwt" }
optional_dependencies_dev_groups = ["dev"]
