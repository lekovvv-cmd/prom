name: prom

x-projects-environment: &projects-environment
  DATABASE_URL: ${PROJECTS_DATABASE_URL:-postgresql+psycopg://project_showcase:project_showcase@projects-db:5432/project_showcase}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-bytes}
  FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}

x-service-desk-environment: &service-desk-environment
  SERVICE_DESK_DATABASE_URL: ${SERVICE_DESK_DATABASE_URL:-postgresql+psycopg://service_desk:service_desk@service-desk-db:5432/service_desk}
  SERVICE_DESK_JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-bytes}
  SERVICE_DESK_FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
  SERVICE_DESK_STORAGE_DIR: ${SERVICE_DESK_STORAGE_DIR:-/app/storage/service-desk}

services:
  projects-db:
    image: postgres:17
    environment:
      POSTGRES_DB: project_showcase
      POSTGRES_USER: project_showcase
      POSTGRES_PASSWORD: project_showcase
    ports:
      - "5432:5432"
    volumes:
      - projects_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_showcase -d project_showcase"]
      interval: 5s
      timeout: 3s
      retries: 20

  service-desk-db:
    image: postgres:17
    environment:
      POSTGRES_DB: service_desk
      POSTGRES_USER: service_desk
      POSTGRES_PASSWORD: service_desk
    ports:
      - "5433:5432"
    volumes:
      - service_desk_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_desk -d service_desk"]
      interval: 5s
      timeout: 3s
      retries: 20

  projects-migrate:
    build: ./backend
    environment: *projects-environment
    depends_on:
      projects-db:
        condition: service_healthy
    command: ["sh", "-c", "python -m alembic upgrade head && python scripts/seed.py"]
    restart: "no"

  service-desk-migrate:
    build: ./service-desk-backend
    environment: *service-desk-environment
    depends_on:
      service-desk-db:
        condition: service_healthy
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

  service-desk-bootstrap:
    build: ./service-desk-backend
    environment:
      <<: *service-desk-environment
      PROJECTS_DATABASE_URL: ${PROJECTS_DATABASE_URL:-postgresql+psycopg://project_showcase:project_showcase@projects-db:5432/project_showcase}
    depends_on:
      projects-migrate:
        condition: service_completed_successfully
      service-desk-migrate:
        condition: service_completed_successfully
    command: ["sh", "-c", "python scripts/bootstrap_identity.py && python scripts/seed.py"]
    restart: "no"

  projects-backend:
    build: ./backend
    environment: *projects-environment
    ports:
      - "8000:8000"
    depends_on:
      projects-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  service-desk-backend:
    build: ./service-desk-backend
    environment: *service-desk-environment
    ports:
      - "8001:8001"
    volumes:
      - service_desk_storage:/app/storage/service-desk
    depends_on:
      service-desk-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  service-desk-sla-worker:
    build: ./service-desk-backend
    environment: *service-desk-environment
    command: ["python", "scripts/sla_worker.py"]
    volumes:
      - service_desk_storage:/app/storage/service-desk
    depends_on:
      service-desk-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SERVICE_DESK_API_BASE_URL: ${VITE_SERVICE_DESK_API_BASE_URL:-/service-desk-api}
    ports:
      - "5173:80"
    depends_on:
      projects-backend:
        condition: service_healthy
      service-desk-backend:
        condition: service_healthy
    restart: unless-stopped

  projects-tests:
    profiles: ["test"]
    build: ./backend
    command: ["python", "-m", "pytest", "-q"]

  service-desk-tests:
    profiles: ["test"]
    build: ./service-desk-backend
    command: ["python", "-m", "pytest", "-q"]

  frontend-tests:
    profiles: ["test"]
    build:
      context: ./frontend
      target: build
    command: ["npm", "test"]

volumes:
  projects_db_data:
  service_desk_db_data:
  service_desk_storage:
