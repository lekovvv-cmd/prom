server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    client_max_body_size 12m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/access/v1/ {
        proxy_pass http://access-service:8002/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
    }

    location /api/access/v1/auth/mock/ {
        proxy_pass http://access-service:8002/auth/mock/;
        proxy_set_header X-Request-ID $request_id;
    }

    location = /.well-known/jwks.json {
        proxy_pass http://access-service:8002/.well-known/jwks.json;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/projects/v1/ {
        proxy_pass http://projects-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
    }

    location /api/projects/v1/uploads/ {
        proxy_pass http://projects-backend:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
    }

    location /api/service-desk/v1/ {
        proxy_pass http://service-desk-backend:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
    }

    # Compatibility endpoints retained while module clients migrate to v1.
    location /api/ {
        proxy_pass http://projects-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
    }

    location /service-desk-api/ {
        proxy_pass http://service-desk-backend:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
