map $http_x_request_id $prom_request_id {
    default $http_x_request_id;
    "" $request_id;
}

map $http_x_correlation_id $prom_correlation_id {
    default $http_x_correlation_id;
    "" $prom_request_id;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $access_backend http://access-service:8002;
    set $projects_backend http://projects-backend:8000;
    set $service_desk_backend http://service-desk-backend:8001;
    client_max_body_size 12m;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header X-Request-ID $prom_request_id always;
    add_header X-Correlation-ID $prom_correlation_id always;
    add_header_inherit merge;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/access/v1/ {
        client_max_body_size 1m;
        rewrite ^/api/access/v1/(.*)$ /api/v1/$1 break;
        proxy_pass $access_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
    }

    location /api/access/v1/auth/mock/ {
        client_max_body_size 1m;
        rewrite ^/api/access/v1/auth/mock/(.*)$ /auth/mock/$1 break;
        proxy_pass $access_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
    }

    location /api/access/v1/health/ {
        rewrite ^/api/access/v1/health/(.*)$ /health/$1 break;
        proxy_pass $access_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
    }

    location = /.well-known/jwks.json {
        proxy_pass $access_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
    }

    location /api/projects/v1/ {
        rewrite ^/api/projects/v1/(.*)$ /api/$1 break;
        proxy_pass $projects_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location /api/projects/v1/uploads/ {
        rewrite ^/api/projects/v1/uploads/(.*)$ /uploads/$1 break;
        proxy_pass $projects_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location /api/service-desk/v1/ {
        rewrite ^/api/service-desk/v1/(.*)$ /$1 break;
        proxy_pass $service_desk_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Deprecated compatibility endpoint retained while Projects clients migrate
    # to /api/projects/v1/. Remove only after the published sunset window.
    location /api/ {
        proxy_pass $projects_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
        proxy_request_buffering off;
        proxy_buffering off;
        add_header Deprecation "true" always;
        add_header Sunset "Sat, 31 Jan 2027 00:00:00 GMT" always;
        add_header Link "</api/projects/v1/>; rel=\"successor-version\"" always;
    }

    # Deprecated compatibility endpoint retained while Service Desk clients
    # migrate to /api/service-desk/v1/.
    location /service-desk-api/ {
        rewrite ^/service-desk-api/(.*)$ /$1 break;
        proxy_pass $service_desk_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $prom_request_id;
        proxy_set_header X-Correlation-ID $prom_correlation_id;
        proxy_set_header Traceparent $http_traceparent;
        proxy_request_buffering off;
        proxy_buffering off;
        add_header Deprecation "true" always;
        add_header Sunset "Sat, 31 Jan 2027 00:00:00 GMT" always;
        add_header Link "</api/service-desk/v1/>; rel=\"successor-version\"" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
