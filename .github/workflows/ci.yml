name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///ci.db
      JWT_SECRET: ci-secret-with-at-least-thirty-two-bytes
      FRONTEND_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations and seed
        run: |
          alembic upgrade head
          python scripts/seed.py

      - name: Run backend tests
        run: pytest

  service-desk-backend:
    name: Service Desk backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-desk-backend
    env:
      SERVICE_DESK_DATABASE_URL: sqlite:///ci_service_desk.db
      SERVICE_DESK_FRONTEND_ORIGIN: http://localhost:5173
      SERVICE_DESK_JWT_SECRET: ci-secret-with-at-least-thirty-two-bytes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Service Desk backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Service Desk migrations
        run: alembic upgrade head

      - name: Seed Service Desk demo data
        run: python scripts/seed.py

      - name: Run Service Desk backend tests
        run: pytest

      - name: Lint Service Desk backend
        run: ruff check .

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  e2e:
    name: Browser MVP e2e
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///e2e.db
      JWT_SECRET: ci-secret-with-at-least-thirty-two-bytes
      FRONTEND_ORIGIN: http://127.0.0.1:5173
      UPLOADS_DIR: storage/e2e_uploads
      VITE_API_BASE_URL: http://127.0.0.1:8000/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare backend database
        working-directory: backend
        run: |
          alembic upgrade head
          python scripts/seed.py

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run MVP e2e
        working-directory: frontend
        run: |
          cd ../backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-e2e.log 2>&1 &
          BACKEND_PID=$!
          cd ../frontend
          npm run dev -- --host 127.0.0.1 --port 5173 > ../frontend-e2e.log 2>&1 &
          FRONTEND_PID=$!
          trap 'kill $BACKEND_PID $FRONTEND_PID || true' EXIT
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/api/health; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/api/health
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:5173; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:5173
          npm run test:e2e

      - name: Upload e2e diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            backend-e2e.log
            frontend-e2e.log
            frontend/playwright-report
            frontend/test-results
